name: Full Release Pipeline

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev debhelper rpm zstd rsync gnupg

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Set GPG trust
        run: |
          KEY_ID=$(gpg --list-secret-keys --with-colons | grep '^sec' | cut -d: -f5 | head -n1)
          echo "Using key $KEY_ID"
          echo "KEY_ID=$KEY_ID" >> $GITHUB_ENV

      - name: Make scripts executable
        run: chmod +x packaging/*.sh

      - name: Build + sign release
        run: |
          ./packaging/release.sh --sign

      - name: Publish repositories
        run: |
          mkdir -p /tmp/repos
          ./packaging/publish-all.sh /tmp/repos $KEY_ID

      - name: Deploy to host
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

          rsync -avz --delete /tmp/repos/ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/var/www/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          files: |
            packaging/*.deb
            packaging/*.rpm
            packaging/*.pkg.tar.zst
            packaging/*.sha256
            packaging/*.asc
            packaging/RELEASE_NOTES.md
