version: '3.9'

services:
  kea-dashboard:
    build:
      context: ../..
      dockerfile: packaging/docker/Dockerfile
    container_name: kea-dashboard
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ../../config:/app/config
    environment:
      - PYTHONUNBUFFERED=1
